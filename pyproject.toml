[tool.black]
line-length = 88
target-version = ["py312"]

[tool.ruff]
line-length = 88

# Ruff is a linter here, not a formatter
select = [
  "F",  # Pyflakes: real bugs (unused imports, undefined names)
  "B",  # Bugbear: common Python footguns
  "I"   # Import order (safe, Black-compatible)
]

# Let Black own formatting decisions
ignore = [
  "E",  # whitespace / formatting (Black handles this)
  "W"
]

[tool.ruff.lint.isort]
combine-as-imports = true
force-single-line = false

[tool.ruff.lint.per-file-ignores]
"tests/**" = [
  "F401",  # unused imports (pytest fixtures)
  "F811",  # fixture redefinition
  "B018",  # pytest.raises without assignment
]


[tool.pytest.ini_options]
testpaths = ["tests"]
norecursedirs = ["tests/archive"]
